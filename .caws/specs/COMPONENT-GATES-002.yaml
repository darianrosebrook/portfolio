id: COMPONENT-GATES-002
type: chore
title: Reduce portfolio component validation and style-token drift
status: closed
risk_tier: 2
mode: chore
created_at: '2026-05-04T17:19:51.111Z'
updated_at: '2026-05-04T17:19:51.112Z'
blast_radius:
  modules:
    - scripts/
    - ui/components/
    - ui/modules/
    - test/
    - package.json
  data_migration: false
operational_rollback_slo: 30m
scope:
  in:
    - scripts/validateComponents.mjs
    - scripts/check-style-token-values.mjs
    - scripts/check-token-references.mjs
    - ui/components/AnimatedCard/
    - ui/components/AnimatedSection/
    - ui/components/AnimatedText/
    - ui/components/BrandSwitcher/
    - ui/components/Chip/
    - ui/components/Accordion/
    - ui/components/Calendar/
    - ui/components/Command/
    - ui/components/Details/
    - ui/components/Dialog/
    - ui/components/Field/
    - ui/components/OTP/
    - ui/components/Popover/
    - ui/components/Postcard/
    - ui/components/Select/
    - ui/components/Sheet/
    - ui/components/ShowMore/
    - ui/components/Skeleton/
    - ui/components/Switch/
    - ui/components/Tabs/
    - ui/components/Toast/
    - ui/components/Walkthrough/
    - ui/components/SideNavigation/
    - ui/components/SlinkyCursor/
    - ui/components/Spinner/
    - ui/modules/CodeSandbox/
    - ui/modules/DocLayout/
    - ui/modules/Editor/
    - test/
    - package.json
  out:
    - node_modules/
    - dist/
    - build/
    - utils/designTokens/generators/
    - utils/designTokens/core/
invariants:
  - Component runtime behavior is not intentionally redesigned in this slice.
  - Validator changes must reduce false positives without hiding missing required docs/tests.
  - Style-token linting must distinguish allowed CSS primitives from token bypasses.
acceptance:
  - id: A1
    given: validateComponents checks provider and helper files
    when: npm run validate:components is run
    then: |
      provider and conventional subcomponent files no longer produce generic
      ComponentName-pattern warnings, while real missing catalog files remain
      reported as errors.
    test_command: npm run validate:components
  - id: A2
    given: current component catalog entries with missing required files
    when: actionable missing README/test/index/main-file errors are addressed
    then: |
      AnimatedCard, AnimatedSection, AnimatedText, BrandSwitcher, Chip,
      CodeSandbox, DocLayout, and Editor no longer contribute missing-file
      errors to component validation.
    test_command: npm run validate:components
  - id: A3
    given: component SCSS contains both intentional primitives and token bypasses
    when: style-token value validation runs
    then: |
      allowed primitives such as 1px borders, focus outlines, transparent, none,
      0, 100%, and visually-hidden recipes are not failures; raw colors, spacing,
      typography sizes, and durations in component styles are flagged unless
      expressed through tokens or explicitly local public CSS variables.
    test_command: npm run styles:tokens
  - id: A4
    given: the follow-up validation and style-token gates have been updated
    when: final verification is performed
    then: |
      component validation, style-token validation, contract validation, token
      linting, and focused tests have been run; any residual failures are
      documented with current counts and examples.
    test_command: npm run contracts:validate && npm run tokens:lint
acceptance_criteria: []
non_functional:
  a11y: []
  perf: {}
  security: []
contracts:
  - type: project_setup
    path: .caws/specs/COMPONENT-GATES-002.yaml
    description: Scope and acceptance contract for component validation/style-token follow-up.
worktree: component-gates-002
