type: fix
status: closed
risk_tier: 2
mode: fix
blast_radius:
  modules:
    - ui/components
    - utils
    - test
    - app
  data_migration: false
operational_rollback_slo: 1h
scope:
  in:
    - ui/components/Spinner/
    - ui/components/Icon/
    - ui/components/Skeleton/
    - ui/components/AspectRatio/
    - ui/components/Popover/
