invariants:
  - No test left in .skip / xfail without a tracking ticket
  - No TODO(TEST-AUDIT-001) tags remain in committed code when this spec closes
  - Every component-rewrite case includes both source and test rewrites
  - Every test-only case keeps the component source untouched
acceptance:
  - id: A1
    given: a failing test classified as component-rewrite
    when: implementation lands
    then: >-
      both the source component and its test are rewritten and address the
      a11y/contract gap
  - id: A2
    given: a failing test classified as test-only
    when: implementation lands
    then: >-
      only the test is rewritten; component source is unchanged; the new
      assertions match the actual implemented contract
  - id: A3
    given: this spec is closed
    when: I run npm test
    then: >-
      the 89 audited failures are resolved (passing or explicitly removed with
      justification recorded)
  - id: A4
    given: any file modified under this spec
    when: I grep for TODO(TEST-AUDIT-001)
    then: zero matches remain
acceptance_criteria: []
non_functional:
  a11y:
    - Spinner exposes role=status + aria-busy
    - Icon exposes role=img when labelled, aria-hidden when decorative
    - Skeleton exposes role=status when not decorative
    - Popover sets aria-haspopup=dialog (not literal "true")
    - Toast items set aria-live (polite for non-error, assertive for error)
    - Field ErrorText sets aria-live=polite
    - Calendar exposes role=application + aria-label
  perf: {}
  security: []
contracts: []
id: TEST-AUDIT-001
title: Audit & rewrite 89 failing tests (component vs test-only classification)
