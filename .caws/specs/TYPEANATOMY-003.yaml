contracts:
  - type: project_setup
    path: utils/typeAnatomy/evidence/corners/index.ts
    description: TypeScript-internal contract — the corner evidence module's exported primitive signatures (`extractCornerSamples(contour, segments)`, sharpness predicate, position-band predicates, interior-direction query, duplicate-suppression helper). The CAWS schema's API-contract types (openapi/graphql/proto/pact) do not apply to internal TS libraries; project_setup is used here per CAWSFIX-06 schema permissiveness with this rationale recorded.
observability:
  logs: []
  metrics: []
  traces: []
migrations: []
rollback:
  - Revert the slice's commits. The detectors return to their pre-slice ray-based implementations; the four currently-failing accuracy cases (A apex, A vertices, A crotch, V crotch) revert to `it.fails`.
ai_assessment:
  confidence_level: 7
  uncertainty_areas:
    - Whether outline-walking on `geo.segments` produces stable tangents on quadratic and cubic curve segments. Nohemi `A`/`V` are straight-stroke (line segments only), so the slice may sidestep the issue. Newsreader's curved terminals exercise curve segments in tangentially-touched code paths — A6's regression guard is the structural protection there, not a positive accuracy claim.
    - Whether one sharpness threshold serves all four classes (apex, vertex, A-crotch, V-crotch). Interior corners typically span a larger turn-angle range than exterior tips. The slice may end up exposing per-detector configuration of the threshold, which is acceptable if recorded.
    - Whether `interiorDirection` is computable correctly from contour winding for inner-loop holes. Holes are out of scope for the four target glyphs (A and V have no interior holes for these features). If a future detector consumes corners-on-holes the API may need extension; not resolved in this slice.
  recommended_pairing: false
