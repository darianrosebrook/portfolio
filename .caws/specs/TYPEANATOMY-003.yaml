id: TYPEANATOMY-003
title: Seed outline-corner evidence for apex, vertex, and crotch detection
risk_tier: 3
mode: feature
created_at: '2026-04-29T02:57:34.576Z'
updated_at: '2026-04-29T19:41:37.605Z'
