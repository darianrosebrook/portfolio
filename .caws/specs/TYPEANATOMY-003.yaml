invariants:
  - Corner evidence operates on existing GeometryCache segment + contour index data; it does not require GeometryCache, ContourClassification, or SegmentWithMeta schema changes.
  - Corner evidence is anatomy-neutral — the layer emits geometric corner candidates with neutral fields (point, incoming/outgoing tangent, signed turn angle, interior direction). It does not emit `apex`/`vertex`/`crotch` labels; that mapping lives in detectors.
  - Detector vocabulary may intentionally map the same geometric corner to different anatomy concepts. V's bottom point may legitimately be both a `vertex` and a `crotch`; the evidence layer does not enforce mutual exclusion across detectors.
  - The slice is limited to straight-stroke, outer-contour behavior on Nohemi A/V. Curved-terminal handling, italic-tangent compensation, and serif/finial/ear behavior are out of scope; curve-segment regions are touched only insofar as A6's regression guard requires them not to break.
  - Existing passing real-font behavior — especially Newsreader paths touched indirectly by apex, vertex, and crotch detectors — must remain green. Pre-slice baseline of 334 passed tests (post TYPEANATOMY-002 closure) is the floor.
acceptance:
  - id: A1
    given: a reusable outline-corner evidence layer at utils/typeAnatomy/evidence/corners/
    when: apex, vertex, and crotch detectors need sharp join candidates
    then: |
      the detectors consume neutral corner candidates from the evidence
      layer rather than detector-local ray-convergence heuristics. Any
      corner-evidence primitive that ends up consumed by zero detectors is
      removed before slice closure.
    test_command: pnpm vitest run utils/typeAnatomy/evidence/corners
  - id: A2
    given: Nohemi-VF.ttf loaded and the uppercase `A` glyph
    when: detectApex runs on the glyph
    then: |
      exactly one apex is reported as a point-like feature near the top
      center, not a long horizontal line/ridge artifact. Replaces the
      current behavior in which two `line` shapes are emitted (one at
      glyph top, one ~190 units below) because synthesized rays converge
      on the outside of the diagonal strokes rather than the apex tip.
      Whether the shape type is `point` or another point-like
      representation is an implementation choice; the AC pins the
      semantic invariant — single, near-tip, not a ridge.
    test_command: pnpm vitest run test/typeAnatomy/feature-accuracy.test.ts -t "finds exactly one apex on Nohemi A"
  - id: A3
    given: Nohemi-VF.ttf loaded and the uppercase `A` glyph
    when: detectVertex runs on the glyph
    then: |
      at least two vertices are reported, drawn from outline corners on
      the leg-end region. Exact count is not pinned because the corner
      extractor may legitimately surface inside+outside corners per leg
      depending on how the contour represents the baseline meeting
      points. Regression on this loose count is structurally caught by
      A6.
    test_command: pnpm vitest run test/typeAnatomy/feature-accuracy.test.ts -t "detects vertices on Nohemi A"
  - id: A4
    given: Nohemi-VF.ttf loaded and the uppercase `A` glyph
    when: detectCrotch runs on the glyph
    then: |
      exactly one upper interior crotch is reported, spatially distinct
      from the outer apex if and only if the glyph geometry supports the
      distinction. On Nohemi `A`'s pointed apex the interior tip of the
      `^` sits below the outermost top point; the AC does not pin a
      hard y-range because the spatial offset depends on stroke
      thickness in the design.
    test_command: pnpm vitest run test/typeAnatomy/feature-accuracy.test.ts -t "detects the A crotch"
  - id: A5
    given: Nohemi-VF.ttf loaded and the uppercase `V` glyph
    when: detectCrotch runs on the glyph
    then: |
      exactly one bottom crotch is reported at the bottom-center sharp
      join. This may be the same geometric event reported by detectVertex
      (per the third invariant); the AC does not require V crotch and V
      vertex to be different points. detectVertex behavior on V is not
      a separate AC; it is regression-protected by A6.
    test_command: pnpm vitest run test/typeAnatomy/feature-accuracy.test.ts -t "detects the V crotch"
  - id: A6
    given: the full type-anatomy and evidence suite (test/typeAnatomy + test/utils/typeAnatomy + utils/typeAnatomy/evidence)
    when: the slice lands
    then: |
      total pass count is greater than or equal to the pre-slice baseline
      of 334. Unrelated detector gaps (arm, serif, finial, ear, spur,
      bowl, stem, eye, aperture, tittle false-positive on a) remain in
      whatever it.fails state they currently sit. No previously-passing
      assertion flips to failing or to it.fails. Newsreader-glyph paths
      touched indirectly by the corner-evidence rewrite produce
      equivalent or better output.
    test_command: pnpm vitest run test/typeAnatomy test/utils/typeAnatomy utils/typeAnatomy/evidence
  - id: A7
    given: the corner evidence module
    when: its synthetic unit tests run (no real-font load)
    then: |
      the tests verify, at minimum: (a) sharp exterior corners are
      emitted on a triangle's three vertices; (b) sharp interior
      corners are emitted at the inside tip of an `^`-shaped polyline;
      (c) ridge / nearly-collinear segment joins are rejected
      (rectangle's right-angle corners not classified as sharp under
      default threshold); (d) duplicate suppression — two near-coincident
      corner candidates collapse to one. All four cases run on
      hand-built fixtures, independent of any real-font load.
    test_command: pnpm vitest run utils/typeAnatomy/evidence/corners
non_functional:
  a11y: []
  perf: {}
