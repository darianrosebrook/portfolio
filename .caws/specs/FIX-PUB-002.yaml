id: FIX-PUB-002
title: 'New article page: hydration, autosave 400, script-in-render'
risk_tier: 3
mode: fix
created_at: '2026-05-18T07:31:42.611Z'
updated_at: '2026-05-18T07:31:42.613Z'
blast_radius:
  modules:
    - app/dashboard/articles/new
    - utils/schemas/article.schema
    - app/layout
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - app/dashboard/articles/new/**
    - utils/schemas/article.schema.ts
    - app/layout.tsx
    - test/api/articles**
    - test/utils/schemas**
  out:
    - node_modules/
    - dist/
    - build/
invariants:
  - >-
    First render on the new-article page must match between server and client (no hydration
    mismatch)
  - Autosave POST to /api/articles must succeed for a draft populated from localStorage
  - No inline script rendered as a child of a React component in the layout
acceptance:
  - id: A1
    given: A user has a draft saved in localStorage and navigates to /dashboard/articles/new
    when: The page renders for the first time
    then: There is no hydration mismatch warning, and the saved draft is visible after mount
  - id: A2
    given: A draft is autosaved for the first time (POST /api/articles)
    when: The autosave fires with the standard payload (no working underscore fields included)
    then: The server returns 201, not 400
  - id: A3
    given: The root layout renders on the server
    when: The page hydrates on the client
    then: No "Encountered a script tag while rendering React component" warning fires
non_functional:
  security: []
  accessibility: []
  performance: []
contracts: []
