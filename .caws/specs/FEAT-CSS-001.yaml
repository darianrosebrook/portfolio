id: FEAT-CSS-001
type: refactor
title: Migrate from SCSS modules to plain CSS modules
status: closed
risk_tier: 3
mode: development
created_at: '2026-05-18T08:59:22.636Z'
updated_at: '2026-05-18T08:59:22.637Z'
blast_radius:
  modules:
    - ui/components
    - utils/designTokens/generators
  data_migration: false
operational_rollback_slo: 30m
scope:
  in:
    - ui/components/**/*.scss
    - ui/components/**/*.css
    - ui/components/**/*.tsx
    - utils/designTokens/generators/**
    - package.json
  out:
    - node_modules/
    - dist/
    - build/
    - app/**
invariants:
  - All components still render with their token-driven custom properties applied
  - Build succeeds with no Sass deprecation warnings from migrated files
  - CSS Modules class scoping still works (hashed selectors)
acceptance:
  - id: A1
    given: A migrated component module
    when: Its rendered DOM is inspected
    then: All its --component-* custom properties are present on the root element
  - id: A2
    given: A token JSON file is updated and the generator runs
    when: The generated file is rewritten
    then: The consumer module file's token block is updated in place, preserving hand-written styles
  - id: A3
    given: The full token+next build runs
    when: It completes
    then: Zero Sass @import deprecation warnings come from ui/components migrated modules
acceptance_criteria: []
non_functional:
  a11y: []
  perf: {}
  security: []
contracts: []
worktree: scss-to-css
