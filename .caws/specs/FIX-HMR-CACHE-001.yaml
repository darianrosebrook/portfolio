id: FIX-HMR-CACHE-001
type: fix
title: Gate Next-managed Cache-Control headers to production only
status: closed
risk_tier: 3
mode: fix
created_at: '2026-05-18T16:50:42.831Z'
updated_at: '2026-05-18T17:00:00.000Z'
blast_radius:
  modules:
    - next.config.mjs
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - next.config.mjs
  out:
    - node_modules/
    - dist/
    - build/
    - .next/
invariants:
  - Production cache headers for /_next/static and /_next/image remain "public, max-age=31536000, immutable"
  - User-owned asset paths (/:all*(svg|jpg|...), /fonts/:path*) keep their existing cache headers in both dev and prod
  - No new dependencies introduced
acceptance:
  - id: A1
    given: The dev server is started (NODE_ENV !== "production")
    when: It logs configured headers on startup
    then: The "Custom Cache-Control headers detected" warning does not list /_next/static or /_next/image
  - id: A2
    given: A production build is run (NODE_ENV === "production")
    when: A request hits /_next/static/<asset> or /_next/image
    then: The response includes Cache-Control "public, max-age=31536000, immutable"
  - id: A3
    given: The dev server is running
    when: A static asset under /_next/static is requested
    then: The response does not include the long-lived immutable Cache-Control header (so HMR can replace the asset on subsequent requests)
non_functional:
  a11y: []
  perf:
    - Production CDN cacheability for hashed static assets is preserved
  security: []
contracts: []
worktree: fix-cache-control-hmr
