  confidence_level: 7
  uncertainty_areas:
    - The exact touch-up scope on geometryCache.ts — getMarkContours may need either a tighter filter (small disconnected piece above main body's vertical extent) or a full rewrite consuming the new topology predicates. Bounded to that one function regardless.
    - Whether the proposed topology thresholds (compactness, separation, position bands) generalize to other typefaces. The slice validates only on Nohemi; cross-font generality is a follow-up slice.
