invariants:
  - The topology evidence family is independent of measureOrthogonalThickness — disconnected-mark detection must not depend on the orthogonal-thickness substrate built for Slice 1
  - The tittle detector exhibits both positive and negative pressure — `i` and `j` produce exactly one tittle, while `H`, `l`, and `I` produce zero
  - getMarkContours rejects main-body fragments via topology predicates before any positional gating is applied — main-body classification happens first, position second
acceptance:
  - id: A1
    given: a new reusable topology evidence layer at utils/typeAnatomy/evidence/topology/
    when: tittle detection is implemented against the layer
    then: detectTittle consumes topology predicates for disconnected contour detection, compactness, body separation, vertical position, and stem alignment; any predicate omitted from the originally-proposed family is explicitly justified in spec notes or commit messages
  - id: A2
    given: Nohemi-VF.ttf loaded and the lowercase `i` glyph
    when: detectTittle runs on the glyph
    then: exactly one tittle is reported, classified as a compact disconnected mark, with normalized center x ∈ [0.25, 0.75] and y ∈ [0.75, 1.0]
  - id: A3
    given: Nohemi-VF.ttf loaded and the lowercase `j` glyph
    when: detectTittle runs on the glyph
    then: exactly one tittle is reported with the same compact disconnected-mark classification and position bounds as A2
  - id: A4
    given: Nohemi-VF.ttf loaded and the glyphs `H`, `l`, and `I`
    when: detectTittle runs on each glyph
    then: zero tittles are reported for each, because every candidate contour is classified as a main-body fragment by the topology predicates before positional gating
  - id: A5
    given: the existing `it.fails(...)` cases in test/typeAnatomy/feature-accuracy.test.ts that document the tittle bugs
    when: Slice 2 lands
    then: the `i` tittle placement and `H` false-tittle cases flip from `it.fails` to passing `it`; the `j` case flips if it exists in the same `it.fails` form; new passing negative tests for `l` and `I` may be added but are not flips
  - id: A6
    given: the topology predicate module
    when: its unit tests run on synthetic SVG path fixtures
    then: each predicate has at least one positive case (predicate fires) and one negative case (predicate rejects), independent of any real-font load
