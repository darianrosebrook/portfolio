id: CONTRACT-GATES-001
type: chore
title: Repair portfolio contract validation gates
status: active
risk_tier: 2
mode: chore
created_at: '2026-05-04T16:39:09.998Z'
updated_at: '2026-05-04T16:39:09.999Z'
blast_radius:
  modules:
    - ui/designTokens/
    - ui/components/
    - scripts/
    - test/
    - package.json
  data_migration: false
operational_rollback_slo: 30m
scope:
  in:
    - ui/designTokens/component.contract.schema.json
    - ui/components/**/*.contract.json
    - ui/components/**/*.scss
    - ui/components/**/*.module.scss
    - scripts/validate-contracts.mjs
    - scripts/validateComponents.mjs
    - scripts/check-token-references.mjs
    - scripts/check-kebab-token-vars.mjs
    - test/
    - package.json
  out:
    - node_modules/
    - dist/
    - build/
    - utils/designTokens/generators/
    - utils/designTokens/core/
invariants:
  - Production component behavior is not intentionally changed.
  - Contract validation stays strict by naming supported fields instead of allowing arbitrary objects.
  - Generated component token files remain generated artifacts; source token JSON is not redesigned in this slice.
acceptance:
  - id: A1
    given: portfolio component contracts with richer metadata and strict schema validation
    when: npm run contracts:validate is run
    then: |
      the schema validates intentional authored fields such as description, a2ui,
      object-style dismissal, richer motion/focus/relationships metadata,
      recursive token values, and token literal entries while still rejecting
      unsupported root fields.
    test_command: npm run contracts:validate
  - id: A2
    given: focused schema regression tests
    when: the test suite runs those tests
    then: |
      the tests cover a2ui, motion, dismissal, recursive tokens, token literal
      forms, and at least one unsupported-field rejection.
    test_command: npm test -- --run test/componentContractSchema.test.ts
  - id: A3
    given: component SCSS uses generated component token variables
    when: token reference validation runs
    then: |
      camelCase custom-property references fail validation, existing component
      SCSS references use generated kebab-case names, and npm run validate includes
      the reliable token reference gate.
    test_command: node scripts/check-kebab-token-vars.mjs && node scripts/check-token-references.mjs
  - id: A4
    given: validateComponents checks component structure
    when: npm run validate:components is run
    then: |
      composer-specific provider/hook checks only apply to composer contracts,
      index export validation accepts exports that resolve to existing local
      modules, and conventional helper files such as types.ts are not naming
      warnings.
    test_command: npm run validate:components
  - id: A5
    given: the contract, token, and component gates have been updated
    when: final verification is performed
    then: |
      npm run contracts:validate, token reference validation, npm run
      validate:components, npm run typecheck, and npm run lint have all been run;
      any residual baseline failures are documented.
    test_command: npm run typecheck && npm run lint
acceptance_criteria: []
non_functional:
  a11y: []
  perf: {}
  security: []
contracts:
  - type: project_setup
    path: .caws/specs/CONTRACT-GATES-001.yaml
    description: Scope and gate contract for portfolio component validation repair.
worktree: contract-gates-001
