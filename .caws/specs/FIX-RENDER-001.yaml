id: FIX-RENDER-001
type: fix
title: Public article renderer 500 on link/textStyle marks
status: active
risk_tier: 3
mode: development
created_at: '2026-05-18T08:48:41.822Z'
updated_at: '2026-05-18T08:48:41.823Z'
blast_radius:
  modules:
    - app/articles/[slug]
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - app/articles/[slug]/page.tsx
    - test/utils/tiptap/**
  out:
    - node_modules/
    - dist/
    - build/
invariants:
  - The public article renderer must use the full server-extension set, not a hardcoded subset
  - generateHTML errors must be caught so a malformed body never 500s the page
acceptance:
  - id: A1
    given: An article whose body contains modern marks (link, textStyle) or nodes beyond StarterKit
    when: A reader visits /articles/<slug>
    then: The page renders successfully (200) with the body content visible
  - id: A2
    given: An article body that contains an unknown node type
    when: Server renders the page
    then: generateHTML's error is caught and the page renders without 500
acceptance_criteria: []
non_functional:
  a11y: []
  perf: {}
  security: []
contracts: []
worktree: fix-live-article-render
