id: FIX-PUB-003
type: fix
title: PUT /api/articles 400 on publish
status: active
risk_tier: 3
mode: development
created_at: '2026-05-18T08:02:41.756Z'
updated_at: '2026-05-18T08:02:41.757Z'
blast_radius:
  modules:
    - app/dashboard/articles/new
    - app/api/articles/[slug]
    - utils/schemas/article.schema
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - app/dashboard/articles/new/**
    - app/api/articles/[slug]/route.ts
    - utils/schemas/article.schema.ts
    - test/utils/schemas/**
    - test/api/articles**
  out:
    - node_modules/
    - dist/
    - build/
invariants:
  - PUT /api/articles/<slug> with status=published succeeds for a normal article row
  - Schema accepts realistic field shapes the DB stores (relative image paths, PG timestamps)
acceptance:
  - id: A1
    given: A user clicks Publish on a saved article whose row has a relative image path
    when: The client issues PUT to publish
    then: The server returns 200, not 400
  - id: A2
    given: A draft row whose working_modified_at is a Postgres-style timestamp (not strict ISO 8601)
    when: The schema validates an update payload containing that value
    then: Validation succeeds
  - id: A3
    given: The publish PUT body is sent from the client
    when: The request is constructed
    then: It contains only the fields being modified for publish, not the entire server row
  - id: A4
    given: The PUT validation fails for any reason
    when: The route returns 400
    then: The server logs the zod issues so a developer can diagnose the failing field
acceptance_criteria: []
non_functional:
  a11y: []
  perf: {}
  security: []
contracts: []
worktree: fix-publish-400
